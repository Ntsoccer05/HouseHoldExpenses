/login:
  post:
    tags:
      - Auth
    summary: ログイン
    description: ユーザーのメールアドレスとパスワードでログイン
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/LoginRequest'
    responses:
      '200':
        description: ログイン成功
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/LoginResponse'
      '401':
        description: 認証失敗（メール/パスワード不正）
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/UnauthorizedError'

/register:
  post:
    tags:
      - Auth
    summary: 仮登録
    description: ユーザーの仮登録（メール認証待ち）
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/RegisterRequest'
    responses:
      '200':
        description: 仮登録成功（確認メール送信）
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/RegisterResponse'
      '422':
        description: バリデーションエラー
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ValidationError'

/logout:
  post:
    tags:
      - Auth
    summary: ログアウト
    description: ユーザーをログアウト
    security:
      - BearerAuth: []
    responses:
      '200':
        description: ログアウト成功
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/MessageResponse'
      '401':
        description: 認証失敗
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/UnauthorizedError'

/user:
  get:
    tags:
      - Auth
    summary: 現在のユーザー情報取得
    description: ログイン中のユーザー情報を取得
    security:
      - BearerAuth: []
    responses:
      '200':
        description: ユーザー情報
        content:
          application/json:
            schema:
              $ref: '../schemas/user.yaml#/User'
      '401':
        description: 認証失敗
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/UnauthorizedError'

/email/verify/{id}/{hash}:
  get:
    tags:
      - Auth
    summary: メールアドレス認証
    description: メール本文のリンクからメールアドレスを認証
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: ユーザーID
      - name: hash
        in: path
        required: true
        schema:
          type: string
        description: 認証ハッシュ
    responses:
      '200':
        description: メール認証成功
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/MessageResponse'

/email/verification-notification:
  post:
    tags:
      - Auth
    summary: 確認メール再送信
    description: メール認証メールを再度送信
    security:
      - BearerAuth: []
    responses:
      '200':
        description: メール再送信成功
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/MessageResponse'

/password/forget:
  post:
    tags:
      - Auth
    summary: パスワードリセット（メール送信）
    description: パスワードリセット用のメール送信
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/PasswordResetRequest'
    responses:
      '200':
        description: メール送信成功
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/MessageResponse'

/password/reset:
  post:
    tags:
      - Auth
    summary: パスワードリセット（確定）
    description: リセットトークンを使ってパスワードを変更
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/PasswordResetConfirmRequest'
    responses:
      '200':
        description: パスワード変更成功
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/MessageResponse'
