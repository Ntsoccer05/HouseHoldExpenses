User:
  type: object
  properties:
    id:
      type: integer
      example: 1
    name:
      type: string
      example: 山田太郎
    email:
      type: string
      format: email
      example: user@example.com
    email_verified_at:
      type: string
      format: date-time
      nullable: true
      example: 2026-04-12T10:30:00Z
    created_at:
      type: string
      format: date-time
      example: 2026-01-01T00:00:00Z
    updated_at:
      type: string
      format: date-time
      example: 2026-04-12T10:30:00Z

LoginRequest:
  type: object
  required:
    - email
    - password
  properties:
    email:
      type: string
      format: email
      example: user@example.com
    password:
      type: string
      format: password
      example: password123

RegisterRequest:
  type: object
  required:
    - name
    - email
    - password
  properties:
    name:
      type: string
      example: 山田太郎
    email:
      type: string
      format: email
      example: user@example.com
    password:
      type: string
      format: password
      example: password123

LoginResponse:
  type: object
  properties:
    user:
      $ref: './user.yaml#/User'
    token:
      type: string
      example: 1|abcdefghijklmnopqrstuvwxyz

PasswordResetRequest:
  type: object
  required:
    - email
  properties:
    email:
      type: string
      format: email
      example: user@example.com

PasswordResetConfirmRequest:
  type: object
  required:
    - email
    - token
    - password
  properties:
    email:
      type: string
      format: email
    token:
      type: string
      description: パスワードリセットトークン
    password:
      type: string
      format: password
      description: 新しいパスワード
